<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIKK Eksamitöö Abirakendus – IT-süsteemide nooremspetsialist</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">VIKK</div>
                <div class="logo-text">
                    <h1>Eksamitöö Abi</h1>
                    <p>IT-süsteemide nooremspetsialist</p>
                </div>
            </div>
            <nav class="nav" id="main-nav"></nav>
            <div class="sidebar-footer">
                <div class="progress-ring">
                    <svg viewBox="0 0 36 36">
                        <path class="progress-ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        <path id="sidebar-progress" class="progress-ring-fill" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                    </svg>
                    <span class="progress-text" id="sidebar-progress-text">0%</span>
                </div>
                <small>Kogu progress</small>
            </div>
        </aside>
        <main class="main">
            <header class="topbar">
                <h2 id="page-title">Ülevaade</h2>
                <div class="topbar-actions">
                    <span class="badge" id="days-badge">-- päeva kaitsmiseni</span>
                    <button class="btn btn-small btn-secondary" onclick="exportData()">Expordi andmed</button>
                    <button class="btn btn-small btn-secondary" onclick="document.getElementById('import-file').click()">Impordi</button>
                    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
                </div>
            </header>
            <div class="content" id="content"></div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
